# Megatron + V1 unified trainer config for the blackbox mini-swe recipe.
#
# Entry point: python3 -m verl.trainer.main_ppo
# Default trainer mode is separate_async. On a single 8-GPU node this recipe
# uses 4 GPUs for trainer and 4 GPUs for standalone rollout.

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_megatron_trainer
  - _self_

actor_rollout_ref:
  hybrid_engine: false
  nccl_timeout: 9600

  model:
    path: ???
    use_remove_padding: false

  rollout:
    name: vllm
    mode: async
    nnodes: 1
    n_gpus_per_node: 4
    prompt_length: 4096
    response_length: 131072
    max_model_len: 135168
    temperature: 1.0
    top_p: 1.0
    top_k: -1
    n: 8
    tensor_model_parallel_size: 4
    gpu_memory_utilization: 0.7
    calculate_log_probs: true
    enable_sleep_mode: true
    free_cache_engine: true
    enable_chunked_prefill: true
    max_num_batched_tokens: 135168
    disable_log_stats: false
    checkpoint_engine:
      backend: nccl
      update_weights_bucket_megabytes: 2048

    val_kwargs:
      temperature: 1.0
      top_p: 0.95
      top_k: -1
      do_sample: true

    multi_turn:
      enable: true
      max_parallel_calls: 1
      format: qwen3_coder

    agent:
      num_workers: 8
      agent_loop_manager_class: uni_agent.framework.entry.AgentFrameworkRolloutAdapter

    custom:
      agent_framework:
        gateway_count: 1
        agent_runners:
          swe_agent:
            runner_fqn: examples.blackbox_recipes.mini_swe_agent.mini_swe_agent_runner.mini_swe_agent_runner
            dispatch_mode: ray_task
            max_concurrent_sessions: 128
            runner_kwargs:
              tool_image: swr.cn-east-3.myhuaweicloud.com/openyuanrong/mini-swe-agent-tool:latest
              run_timeout: 3600
              conda_env: testbed

  actor:
    use_dynamic_bsz: false
    use_rollout_log_probs: true
    ppo_mini_batch_size: 16
    ppo_micro_batch_size_per_gpu: 1
    use_kl_loss: false
    kl_loss_coef: 0.0
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28
    clip_ratio_c: 10.0
    loss_agg_mode: token-mean
    entropy_coeff: 0
    optim:
      lr: 1e-6
      weight_decay: 0.1
      lr_decay_style: constant
    megatron:
      param_offload: true
      grad_offload: true
      optimizer_offload: true
      tensor_model_parallel_size: 4
      pipeline_model_parallel_size: 1
      context_parallel_size: 1
      use_mbridge: true
      vanilla_mbridge: false
      use_remove_padding: false
      dtype: bfloat16
      override_transformer_config:
        use_flash_attn: true
        moe_token_dispatcher_type: alltoall
        use_naive_l2norm: true
        attention_backend: auto
        recompute_method: uniform
        recompute_granularity: full
        recompute_num_layers: 1

  ref:
    log_prob_micro_batch_size_per_gpu: 1
    megatron:
      param_offload: false
      tensor_model_parallel_size: 4
      pipeline_model_parallel_size: 1
      context_parallel_size: 1

data:
  train_files: ???
  val_files: ???
  prompt_key: prompt
  truncation: left
  max_prompt_length: 4096
  max_response_length: 131072
  train_batch_size: 1
  val_batch_size: 1
  gen_batch_size: 1
  return_raw_chat: true
  trust_remote_code: true
  dataloader_num_workers: 0
  custom_cls:
    path: pkg://examples.blackbox_recipes.mini_swe_agent.dataset
    name: SWEBenchDataset

algorithm:
  gamma: 1.0
  lam: 1.0
  adv_estimator: grpo
  use_kl_in_reward: false
  kl_ctrl:
    type: fixed
    kl_coef: 0.0
  rollout_correction:
    bypass_mode: true

reward:
  custom_reward_function:
    path: pkg://examples.blackbox_recipes.mini_swe_agent.reward
    name: compute_score

trainer:
  nnodes: 1
  n_gpus_per_node: 4
  total_epochs: 10
  total_training_steps: null
  project_name: swe_agent_blackbox
  experiment_name: swe_agent
  logger:
    - console
  device: cuda
  val_before_train: true
  val_only: false
  save_freq: 10
  test_freq: 10
  default_local_dir: checkpoints/swe_agent_blackbox
  resume_mode: auto
  use_v1: true
  v1:
    trainer_mode: separate_async
    colocate_async:
      num_warmup_batches: 1
    separate_async:
      num_warmup_batches: 4
      parameter_sync_step: 4

transfer_queue:
  enable: true

ray_kwargs:
  ray_init:
    runtime_env:
      env_vars:
        TRANSFER_QUEUE_ENABLE: ""
        NCCL_P2P_DISABLE: "1"
        NCCL_SHM_DISABLE: "1"
        MAX_TURNS: "100"
        SWE_AGENT_MAX_TURNS: "100"
        DEBUG_MODE: "true"
        SANDBOX_NAME_PREFIX: "mini-swe-"
